<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 25th Birthday!</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            color: white;
        }

        /* Card Styles */
        .card-container { perspective: 1000px; margin-bottom: 30px; }
        .birthday-card {
            position: relative;
            width: 300px;
            height: 400px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .birthday-card.open { transform: rotateY(-180deg); }
        .front, .back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            border-radius: 20px; padding: 20px; text-align: center;
            box-sizing: border-box;
        }
        .front { background: linear-gradient(135deg, #6e8efb, #a777e3); border: 4px solid #fff; }
        .front h1 { font-size: 80px; margin: 0; }
        .back { background: #fff; transform: rotateY(180deg); color: #333; }

        /* Video & Download Section */
        .video-section {
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        video {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }
        .btn-download {
            display: inline-block;
            background: #25D366; /* WhatsApp Green */
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-download:hover { background: #128C7E; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="birthday-card" id="card" onclick="openCard()">
            <div class="front">
                <h1>25</h1>
                <p>Happy Birthday!</p>
                <small>(Tap to Open)</small>
            </div>
            <div class="back">
                <h2>Cheers! 🥂</h2>
                <p>Welcome to 25. May this year be your best one yet!</p>
            </div>
        </div>
    </div>

    <div class="video-section">
        <p>Watch & Share on WhatsApp</p>
        <video id="bdayVideo" controls>
            <source src="your-video-link.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <br>
        <a href="your-video-link.mp4" download="HappyBirthday25.mp4" class="btn-download">
            Download Video for WhatsApp 📲
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        function openCard() {
            const card = document.getElementById('card');
            if(!card.classList.contains('open')) {
                card.classList.add('open');
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 }
                });
            } else {
                card.classList.remove('open');
            }
        }
    </script>
</body>
</html>
